name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # AWS OIDC

jobs:
  build-and-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository_owner }}/promptlens-backend"
          echo "tag=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "cache=${IMAGE}:cache" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache }},mode=max

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Debug OIDC sub claim
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, base64, os
          url = os.environ['ACTIONS_ID_TOKEN_REQUEST_URL'] + '&audience=sts.amazonaws.com'
          hdr = 'Authorization: bearer ' + os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']
          r = subprocess.run(['curl', '-sH', hdr, url], capture_output=True, text=True)
          token = json.loads(r.stdout)['value']
          seg = token.split('.')[1]
          seg += '=' * (-len(seg) % 4)
          d = json.loads(base64.urlsafe_b64decode(seg))
          print('sub: ', d.get('sub', '(missing)'))
          print('iss: ', d.get('iss', '(missing)'))
          print('repo:', d.get('repository', '(missing)'))
          PYEOF

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Deploy via SSM
        run: |
          COMMAND=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$(cat <<'SCRIPT'
          set -euo pipefail

          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
          GH_ACTOR="${{ github.actor }}"
          GH_TOKEN="${{ secrets.GH_PAT }}"

          cd "$DEPLOY_PATH"

          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
          export BACKEND_IMAGE="$IMAGE_TAG"

          $COMPOSE pull backend celery-worker
          $COMPOSE up -d --no-deps backend celery-worker
          $COMPOSE exec -T backend alembic upgrade head

          docker logout ghcr.io
          SCRIPT
          )" \
            --output json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND"
          echo "command_id=$COMMAND" >> "$GITHUB_ENV"

      - name: Wait for SSM command to complete
        run: |
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text)

            echo "[$i/24] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment succeeded"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi

            sleep 10
          done

          echo "❌ Timed out waiting for SSM command"
          exit 1

      - name: Notify deployment
        if: always()
        run: |
          SHA="${{ github.sha }}"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployed ${SHA:0:7} to ${{ github.event.inputs.environment || 'production' }} by ${{ github.actor }}"
          else
            echo "❌ Deployment of ${SHA:0:7} failed"
          fi
