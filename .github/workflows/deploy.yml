name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository_owner }}/promptlens-backend"
          echo "tag=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "cache=${IMAGE}:cache" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache }},mode=max

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Deploy via SSM
        run: |
          DEPLOY_SCRIPT=$(cat <<'SCRIPT'
          set -euo pipefail
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
          GH_ACTOR="${{ github.actor }}"
          GH_TOKEN="${{ secrets.GH_PAT }}"

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          RAW="https://raw.githubusercontent.com/think41/prompt-lens/${{ github.sha }}"
          curl -fsSL -H "Authorization: token $GH_TOKEN" "$RAW/docker-compose.prod.yml" -o docker-compose.prod.yml

          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
          export BACKEND_IMAGE="$IMAGE_TAG"

          docker compose -f docker-compose.prod.yml pull backend celery-worker
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

          docker logout ghcr.io
          docker image prune -f
          SCRIPT
          )

          PARAMS=$(jq -n --arg s "$DEPLOY_SCRIPT" '{"commands": [$s]}')

          COMMAND=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND" >> "$GITHUB_ENV"

      - name: Wait for deployment
        run: |
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text)

            echo "[$i/24] $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployed ${{ github.sha }} by ${{ github.actor }}"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi

            sleep 10
          done
          echo "Timed out" && exit 1
