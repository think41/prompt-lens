name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-lint-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promptlens
          POSTGRES_PASSWORD: promptlens
          POSTGRES_DB: promptlens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U promptlens"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r backend/requirements.txt
          uv pip install --python .venv/bin/python ruff

      - name: Ruff lint
        run: .venv/bin/ruff check backend/app backend/tests

      - name: Ruff format check
        run: .venv/bin/ruff format --check backend/app backend/tests

      - name: Run evaluator unit tests
        env:
          TEST_DATABASE_URL: postgresql://promptlens:promptlens@localhost:5432/promptlens_test
        run: |
          PYTHONPATH=backend .venv/bin/pytest backend/tests/evaluators/ -q --tb=short

  # frontend-build disabled until frontend is ready

