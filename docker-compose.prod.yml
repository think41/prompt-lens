services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      APP_ENV: production

  celery-worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    command: ["celery", "-A", "app.jobs.celery_app", "worker", "--loglevel=info", "--concurrency=2", "-Q", "celery"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      APP_ENV: production

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
