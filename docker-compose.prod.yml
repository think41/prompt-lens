services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
             -k uvicorn.workers.UvicornWorker
             --workers 4
             --bind 0.0.0.0:8000
             --timeout 120
             --graceful-timeout 30
             --access-logfile -"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    command: ["celery", "-A", "app.jobs.celery_app", "worker", "--loglevel=info", "--concurrency=2", "-Q", "celery"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.jobs.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    command: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5555', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data:
