# Production overrides — used on EC2.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# BACKEND_IMAGE  — set to the ECR image tag before running (done by deploy.yml)
# DATABASE_URL   — RDS connection string, read from .env on the EC2 host
# REDIS_URL      — redis://redis:6379/0 (Docker container, same compose network)

services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    env_file:
      - path: .env
        required: true

  celery-worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    env_file:
      - path: .env
        required: true

  # Redis runs locally on EC2 — upgrade to ElastiCache when needed
  redis:
    restart: unless-stopped

  # Postgres replaced by RDS — excluded from production
  postgres:
    profiles: [local-only]
