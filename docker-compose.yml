services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptlens
      POSTGRES_PASSWORD: promptlens     # dev-only — use AWS Secrets Manager in production
      POSTGRES_DB: promptlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://promptlens:promptlens@postgres:5432/promptlens
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:8000 --timeout 120 --graceful-timeout 30 --access-logfile -"]

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.jobs.celery_app", "worker", "--loglevel=info", "--concurrency=2", "-Q", "celery"]
    environment:
      DATABASE_URL: postgresql://promptlens:promptlens@postgres:5432/promptlens
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    command: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
